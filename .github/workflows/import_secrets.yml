name: Import Existing Secrets

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Import Secrets
        working-directory: infra/terraform
        run: |
          terraform import aws_secretsmanager_secret.db_password sudokubury/db_password
          terraform import aws_secretsmanager_secret.jwt_key sudokubury/jwt_key
          terraform import aws_secretsmanager_secret.connection_string sudokubury/connection_string