name: Deploy to AWS

on: 
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2 

      - name: Set secrets in Secrets Manager
        run: | 
          aws secretsmanager put-secret-value \
            --secret-id sudokubury/db_password \
            --secret-string "${{ secrets.TF_VAR_DB_PASSWORD }}"

          aws secretsmanager put-secret-value \
            --secret-id sudokubury/jwt_key \
            --secret-string "${{ secrets.TF_VAR_JWT_KEY }}"

          aws secretsmanager put-secret-value \
            --secret-id sudokubury/connection_string \
            --secret-string "${{ secrets.TF_VAR_CONNECTION_STRING }}"

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sudokubury
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f ./SudokuburyWebApp.Server/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve

      - name: Force ECS Redeployment
        run: |
          aws ecs update-service \
          --cluster sudokubury-cluster \
          --service sudokubury-app-service \
          --force-new-deployment

          aws ecs update-service \
          --cluster sudokubury-cluster \
          --service sudokubury-db-service \
          --force-new-deployment